<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUST 쇼핑몰</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./script/jquery-1.12.3.js"></script>
    <script src="./script/script.js" defer></script>
</head>
<body>
    <div class="container">
        <!-- 헤더 -->
        <header class="top-bar">
            <div class="logo">
                <a href="#"><img src="./images/logo.png" alt="로고"></a>
            </div>
            <div class="menu-box">메뉴
                <nav>네비바</nav>
            </div>
        </header>

        <!-- 메인 -->
        <main>
            <div class="slide-box">
                <div class="slide-3600">
                    <ul>
                        <li class="slide slide1">
                            <a href="#">
                                <img src="./images/img1.jpg" alt="슬라이드이미지1">
                                <span>대표 은행, 코리아은행</span>
                            </a>
                        </li>
                        <li class="slide slide2">
                            <a href="#">
                                <img src="./images/img2.jpg" alt="슬라이드이미지2">
                                <span>차원이 다른 코리아은행</span>
                            </a>
                        </li>
                        <li class="slide slide3">
                            <a href="#">
                                <img src="./images/img3.jpg" alt="슬라이드이미지3">
                                <span>더욱 쉬운 오픈뱅킹 서비스</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="content">
                <div class="box1">공지사항/갤러리</div>
                <div class="box2">배너</div>
                <div class="box3">바로가기</div>
            </div>
        </main>

        <!-- 푸터 -->
        <footer>하단부분</footer>
    </div>
</body>
</html>
